<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudEye Intelligence | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="notifications_addon.css">
    <style>
        :root {
            --bg-deep: #020205;
            --sidebar-width: 380px;
            --hud-height: 60px;
            --accent-primary: #3b82f6;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--bg-deep);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Command Center Layout */
        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Intelligence HUD */
        #hud-bar {
            height: var(--hud-height);
            background: rgba(5, 5, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            z-index: 1000;
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .system-branding {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .system-branding i {
            font-size: 1.25rem;
            color: var(--accent-primary);
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
        }

        .sys-title {
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .sys-title span { color: var(--accent-primary); }

        .hud-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hud-stat span { color: #f8fafc; }

        .pulse-indicator {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #main-frame-container {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Permanent Side Intelligence Panel */
        #intelligence-sidebar {
            width: var(--sidebar-width);
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-count-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 900;
        }

        #intel-feed {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Custom Scrollbar for Intel Feed */
        #intel-feed::-webkit-scrollbar { width: 4px; }
        #intel-feed::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- HUD Status Bar -->
        <div id="hud-bar">
            <div class="hud-left">
                <div class="system-branding">
                    <i class="fas fa-shield-halved"></i>
                    <div class="sys-title">FraudEye<span>AI</span> <small style="font-size: 0.6rem; opacity: 0.5; font-weight: 400; margin-left: 4px;">Command Center v2.0</small></div>
                </div>
                <div class="hud-stat">
                    <div class="pulse-indicator"></div>
                    System Status: <span>Live Alpha</span>
                    <span id="sensor-status" class="ws-status-badge disconnected">Offline</span>
                </div>
                <div class="hud-stat">
                    Security Level: <span style="color: #3b82f6;">Enhanced</span>
                </div>
            </div>
            <div class="hud-right">
                <div class="hud-stat">
                    Threat Level: <span id="hud-threat-level" style="color: #10b981;">Low</span>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="workspace">
            <!-- Existing Dashboard Frame -->
            <div id="main-frame-container">
                <iframe src="index.html"></iframe>
            </div>

            <!-- Intelligence Panel -->
            <div id="intelligence-sidebar">
                <div class="panel-header">
                    <h2><i class="fas fa-tower-broadcast"></i> Intelligence Feed</h2>
                    <div id="intel-alert-count" class="alert-count-badge">0</div>
                </div>
                <!-- This will be populated by notifications_addon.js -->
                <div id="intel-feed">
                    <div style="text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 2rem;">
                        <i class="fas fa-circle-notch fa-spin" style="margin-bottom: 1rem; display: block; font-size: 1.5rem;"></i>
                        Waiting for sensor data...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Standalone Logic -->
    <script src="notifications_addon.js"></script>
</body>
</html>
